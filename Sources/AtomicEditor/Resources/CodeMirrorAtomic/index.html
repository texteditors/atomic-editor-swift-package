<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <title>Atomic CodeMirror</title>
  <link rel="stylesheet" href="./editor.bundle.css">
  <style>
    :root {
      color-scheme: light dark;
      --host-safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html,
    body,
    #editor-root {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--atomic-editor-bg, #111827);
    }

    body {
      font-family: var(--atomic-editor-font, -apple-system, BlinkMacSystemFont, sans-serif);
    }

    #editor-root {
      display: block;
      min-height: 100%;
    }

    .atomic-cm-editor {
      min-height: 100%;
      width: 100%;
    }

    .atomic-cm-editor .cm-editor {
      width: 100%;
      max-width: var(--atomic-editor-host-max-width, none);
      margin-inline: auto;
      height: 100%;
      background: var(--atomic-editor-bg, #111827);
    }

    .atomic-cm-editor .cm-scroller {
      height: 100%;
      overflow: auto;
      padding-bottom: calc(24px + var(--host-safe-bottom));
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div id="editor-root"></div>
  <script src="./editor.bundle.js"></script>
</body>
</html>
